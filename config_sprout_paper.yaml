# Configuration for streaming contextual bandit experiments on SPROUT dataset

config_type: single_router

# Problem model configuration
PROBLEM_MODEL_TYPE: streaming_sprout
only_redo_plots: false
plot: true

# Results and output configuration
RESULTS_DIR: "results/sprout_paper"

# Embedding configuration
embedding_config:
  model_name: "all-MiniLM-L6-v2"
  dimensions: 384
  suffix: "_all-MiniLM-L6-v2_384-dim"

# Experiment parameters
num_times_to_run: 10
num_rounds: 30000
num_std_to_show: 5
budgets: [2, 3]

# Algorithm parameters
v1: 2.2360679775  # sqrt(5)
v2: 1
rho: 0.9
N: 2
theta: 10.0  # multiplier for variance threshold in CoCoMaMa
hidden_dim: 64  # hidden dimension for Neural CoCoMaMa

# Performance configuration
num_threads_to_use: 10

# Dataset configuration
streaming_dataset_path: "datasets/sprout_streaming_30000.arrow"
create_dataset_if_missing: true
